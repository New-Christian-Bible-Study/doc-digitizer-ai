# Used when `streamlit run` is started with this repo as the current working directory.
# Suppresses the CLI email prompt when no ~/.streamlit/credentials.toml exists yet.
# See README (Review section) for STREAMLIT_SERVER_HEADLESS when cwd is elsewhere.

[server]
headless = true
# Avoids Linux "inotify instance limit reached" from watchdog when many apps
# use the FS watcher; you lose auto-rerun on save (restart Streamlit manually).
fileWatcherType = "none"

[browser]
gatherUsageStats = false
